<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voices Unbounded Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Outfit', sans-serif; font-variant-numeric: tabular-nums; }
        
        .g2-curve { border-radius: 40px; }
        
        /* The Clashing Horizontal Gradient Background - The Perfect Mix */
        .clash-bg {
            background-color: #020617;
            background-image: 
                radial-gradient(circle at 0% 50%, rgba(59, 130, 246, 0.35), transparent 55%), /* Blue from this try */
                radial-gradient(circle at 100% 50%, rgba(239, 68, 68, 0.5), transparent 55%); /* Red from last try */
        }

        /* Custom Crossfire Glow & Gradient Border */
        .crossfire-glow {
            border-color: transparent !important;
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), linear-gradient(to right, #3b82f6, #ef4444);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: -60px 0 120px -20px rgba(59, 130, 246, 0.35), 60px 0 120px -20px rgba(239, 68, 68, 0.35);
        }

        .pulse-tick { transform: scale(1.02); transition: transform 0.05s ease-out; }
        .pulse-rest { transform: scale(1); transition: transform 0.15s ease-in; }

        @keyframes warningPulse {
            0% { box-shadow: inset 0 0 0 0px rgba(239, 68, 68, 0), 0 0 60px rgba(239, 68, 68, 0.4); }
            50% { box-shadow: inset 0 0 0 10px rgba(239, 68, 68, 0.8), 0 0 100px rgba(239, 68, 68, 0.6); }
            100% { box-shadow: inset 0 0 0 0px rgba(239, 68, 68, 0), 0 0 60px rgba(239, 68, 68, 0.4); }
        }
        .stage-warning { animation: warningPulse 2s infinite ease-in-out; border-color: #ef4444 !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 select-none overflow-hidden h-screen w-screen">

    <div id="app" class="h-full w-full"></div>

<script>
// --- Configuration & Default State ---
const DEFAULT_TIMELINE = [
    { id: 'c-pro', name: "Constructive", speaker: "1st Speaker (Pro)", seconds: 180, side: 'pro' },
    { id: 'c-con', name: "Constructive", speaker: "1st Speaker (Con)", seconds: 180, side: 'con' },
    { id: 'r-pro', name: "Rebuttal", speaker: "2nd Speaker (Pro)", seconds: 180, side: 'pro' },
    { id: 'r-con', name: "Rebuttal", speaker: "2nd Speaker (Con)", seconds: 180, side: 'con' },
    { id: 'cf',    name: "Crossfire", speaker: "All Speakers", seconds: 480, side: 'all' },
    { id: 's-pro', name: "Summary", speaker: "3rd Speaker (Pro)", seconds: 180, side: 'pro' },
    { id: 's-con', name: "Summary", speaker: "3rd Speaker (Con)", seconds: 180, side: 'con' }
];

let state = {
    timeline: JSON.parse(JSON.stringify(DEFAULT_TIMELINE)),
    currentIndex: 0,
    remaining: DEFAULT_TIMELINE[0].seconds,
    isRunning: false,
    isDone: false,
    motions: { pro: '', con: '' }
};

const isStageMode = new URLSearchParams(window.location.search).has('stage');
const channel = new BroadcastChannel('debate-timer-channel');
let timerInterval = null;
let lastRenderedIndex = -1;

// --- Audio ---
function beep() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.3, 0.6].forEach(offset => {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 880; osc.type = "sine";
            gain.gain.setValueAtTime(0.4, ctx.currentTime + offset);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.25);
            osc.start(ctx.currentTime + offset); osc.stop(ctx.currentTime + offset + 0.3);
        });
    } catch(e) {}
}

// --- Logic ---
function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${s.toString().padStart(2, "0")}`;
}

function broadcastState() {
    channel.postMessage({ type: 'SYNC', state });
    syncUI();
}

function triggerTickAnimation() {
    const timeEls = [document.getElementById('stage-main-time'), document.getElementById('ctrl-main-time')];
    timeEls.forEach(el => {
        if (!el) return;
        el.classList.remove('pulse-rest');
        el.classList.add('pulse-tick');
        setTimeout(() => {
            el.classList.remove('pulse-tick');
            el.classList.add('pulse-rest');
        }, 50);
    });
}

function tick() {
    if (state.remaining > 0) {
        state.remaining--;
        triggerTickAnimation();
    } else {
        state.isRunning = false;
        state.isDone = true;
        clearInterval(timerInterval);
        if (!isStageMode) beep();
    }
    broadcastState();
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => console.log(err));
    } else {
        document.exitFullscreen();
    }
}

// --- Controller Actions ---
const Actions = {
    toggleTimer: () => {
        if (state.isDone) return;
        state.isRunning = !state.isRunning;
        if (state.isRunning) {
            timerInterval = setInterval(tick, 1000);
        } else {
            clearInterval(timerInterval);
        }
        broadcastState();
    },
    resetTimer: () => {
        clearInterval(timerInterval);
        state.isRunning = false;
        state.isDone = false;
        state.remaining = state.timeline[state.currentIndex].seconds;
        broadcastState();
    },
    adjustTime: (amount) => {
        state.remaining = Math.max(0, state.remaining + amount);
        if (state.remaining > 0 && state.isDone) state.isDone = false;
        broadcastState();
    },
    jumpTo: (index) => {
        clearInterval(timerInterval);
        state.currentIndex = index;
        state.isRunning = false;
        state.isDone = false;
        state.remaining = state.timeline[index].seconds;
        broadcastState();
    },
    nextSegment: () => {
        if (state.currentIndex < state.timeline.length - 1) Actions.jumpTo(state.currentIndex + 1);
    },
    prevSegment: () => {
        if (state.currentIndex > 0) Actions.jumpTo(state.currentIndex - 1);
    },
    updateSpeaker: (e, index) => {
        state.timeline[index].speaker = e.target.value;
        if (index === state.currentIndex) {
            const mainLabel = document.getElementById('ctrl-main-speaker');
            if (mainLabel) mainLabel.innerText = e.target.value;
        }
        broadcastState();
    },
    updateMotion: (side, value) => {
        state.motions[side] = value;
        broadcastState();
    },
    launchStage: () => {
        window.open(window.location.pathname + '?stage=true', 'StageDisplay', 'popup=yes,menubar=no,toolbar=no,location=no,status=no,width=1280,height=720');
        setTimeout(broadcastState, 500); 
    }
};

// --- View Rendering ---
function buildStageHTML() {
    const current = state.timeline[state.currentIndex];
    const isWarning = state.remaining <= 30 && state.remaining > 0;
    
    // G2 Curve Timer Box Styling - Amplified Glow & Crossfire Custom Class
    let glowClass = ''; 
    if (state.isDone) glowClass = 'shadow-none border-slate-900 bg-slate-950/50 text-slate-600';
    else if (isWarning) glowClass = 'stage-warning bg-slate-900/80 border-red-500';
    else if (current.side === 'pro') glowClass = 'shadow-[0_0_120px_rgba(59,130,246,0.35)] border-blue-500 bg-slate-900/80';
    else if (current.side === 'con') glowClass = 'shadow-[0_0_120px_rgba(239,68,68,0.35)] border-red-500 bg-slate-900/80';
    else glowClass = 'crossfire-glow';

    // Current Speaker Styling & Halo
    let speakerColorClass = '';
    let speakerHaloClass = '';
    
    if (current.side === 'pro') {
        speakerColorClass = 'text-blue-400';
        speakerHaloClass = 'drop-shadow-[0_0_20px_rgba(96,165,250,0.8)]';
    } else if (current.side === 'con') {
        speakerColorClass = 'text-red-400';
        speakerHaloClass = 'drop-shadow-[0_0_20px_rgba(248,113,113,0.8)]';
    } else {
        // Aligned gradient to background: Blue on Left, Red on Right
        speakerColorClass = 'bg-gradient-to-r from-blue-400 to-red-400 text-transparent bg-clip-text';
        speakerHaloClass = 'drop-shadow-[0_0_20px_rgba(168,85,247,0.6)]';
    }

    // Motion Logic
    let motionHtml = '';
    if (current.side === 'pro' && state.motions.pro.trim() !== '') {
        motionHtml = `<div class="text-xl text-blue-200 mt-4 max-w-4xl text-center font-medium"><span class="opacity-50 uppercase tracking-widest text-xs block mb-2 font-bold text-slate-300">Motion (Pro)</span> ${state.motions.pro}</div>`;
    } else if (current.side === 'con' && state.motions.con.trim() !== '') {
        motionHtml = `<div class="text-xl text-red-200 mt-4 max-w-4xl text-center font-medium"><span class="opacity-50 uppercase tracking-widest text-xs block mb-2 font-bold text-slate-300">Motion (Con)</span> ${state.motions.con}</div>`;
    } else if (current.side === 'all') {
        let allMotions = [];
        if (state.motions.pro.trim() !== '') allMotions.push(`<div class="flex-1"><span class="opacity-50 uppercase tracking-widest text-xs block mb-2 font-bold text-blue-300">Pro</span><span class="text-blue-100">${state.motions.pro}</span></div>`);
        if (state.motions.con.trim() !== '') allMotions.push(`<div class="flex-1 border-l border-slate-700 pl-8"><span class="opacity-50 uppercase tracking-widest text-xs block mb-2 font-bold text-red-300">Con</span><span class="text-red-100">${state.motions.con}</span></div>`);
        if (allMotions.length > 0) {
            motionHtml = `<div class="flex gap-8 text-lg mt-6 max-w-6xl text-left bg-slate-900/60 p-6 rounded-3xl border border-slate-800 shadow-xl">${allMotions.join('')}</div>`;
        }
    }

    return `
        <div class="flex flex-col h-screen w-screen clash-bg overflow-hidden text-white font-sans">
            
            <div class="flex-1 w-full flex flex-col items-center justify-between relative box-border py-12 px-12 z-10">
                
                <div class="text-center text-slate-400 tracking-[0.3em] uppercase text-xl font-bold drop-shadow-md">
                    ${current.name}
                </div>
                
                <div class="flex-1 flex items-center justify-center w-full">
                    <div class="g2-curve border-2 transition-all duration-700 px-24 py-16 flex items-center justify-center min-w-[600px] ${glowClass} backdrop-blur-sm">
                        <div id="stage-main-time" class="font-display text-[11rem] leading-none font-bold drop-shadow-2xl inline-block transition-colors duration-300 ${isWarning ? 'text-red-400' : 'text-white'} ${state.isDone ? 'opacity-30' : ''}">
                            ${formatTime(state.remaining)}
                        </div>
                    </div>
                </div>

                <div class="flex flex-col items-center justify-end w-full min-h-[160px]">
                    <div class="text-center ${speakerHaloClass} text-5xl font-bold tracking-wide mb-2 transition-all duration-500">
                        <span class="${speakerColorClass}">${current.speaker}</span>
                    </div>
                    ${motionHtml}
                </div>
            </div>

            <div class="h-32 w-full border-t border-slate-800 bg-slate-950/60 backdrop-blur-md flex items-center justify-center px-10 gap-x-10 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-20">
                ${state.timeline.map((seg, idx) => {
                    let tlOpacity = idx === state.currentIndex 
                        ? 'opacity-100 scale-110 border-b-2 border-slate-300 pb-2 drop-shadow-lg text-white' 
                        : idx < state.currentIndex 
                            ? 'opacity-30 text-slate-300' 
                            : 'opacity-60 hover:opacity-80 text-slate-300';
                    
                    return `
                    <div class="transition-all duration-500 transform origin-bottom flex flex-col items-center justify-center cursor-default ${tlOpacity}">
                        <div class="text-[11px] uppercase tracking-[0.25em] text-slate-400 mb-2 font-bold whitespace-nowrap">${seg.name}</div>
                        <div class="text-xl font-bold tracking-wider whitespace-nowrap">${seg.speaker}</div>
                    </div>
                    `;
                }).join('')}
            </div>

            <button id="stage-fs-btn" onclick="toggleFullscreen()" class="absolute bottom-40 right-6 p-4 text-white bg-white/5 hover:bg-white/10 rounded-full transition-opacity duration-500 opacity-0 z-50 cursor-pointer border border-white/10 backdrop-blur-sm">
                ⛶
            </button>
        </div>
    `;
}

function buildControllerHTML() {
    const current = state.timeline[state.currentIndex];
    
    return `
        <div class="h-full flex flex-col bg-white">
            <div class="flex justify-between items-center px-6 py-4 bg-gray-900 text-white shadow-md z-10">
                <div class="font-bold tracking-wider uppercase text-sm">Voices Unbounded | Operator</div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleFullscreen()" class="text-gray-400 hover:text-white text-sm font-medium transition-colors">
                        ⛶ Fullscreen
                    </button>
                    <button onclick="Actions.launchStage()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded text-sm font-semibold transition-colors shadow-lg">
                        📺 Launch Stage Display
                    </button>
                </div>
            </div>

            <div class="flex flex-1 overflow-hidden">
                
                <div class="w-1/3 bg-gray-50 border-r border-gray-200 overflow-y-auto p-6 space-y-6 pb-20">
                    
                    <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-3">
                        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 border-b pb-2">Debate Setup</h2>
                        <div>
                            <label class="text-[10px] uppercase text-gray-400 font-bold block mb-1">Pro Motion (Optional)</label>
                            <input type="text" value="${state.motions.pro}" oninput="Actions.updateMotion('pro', event.target.value)" class="w-full text-sm bg-gray-50 border border-gray-200 rounded p-2 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-medium" placeholder="Enter Pro stance...">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase text-gray-400 font-bold block mb-1">Con Motion (Optional)</label>
                            <input type="text" value="${state.motions.con}" oninput="Actions.updateMotion('con', event.target.value)" class="w-full text-sm bg-gray-50 border border-gray-200 rounded p-2 outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all font-medium" placeholder="Enter Con stance...">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-end mb-2 px-1">
                            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Speakers</h2>
                            <span class="text-[10px] text-gray-400">Click names to edit</span>
                        </div>
                        ${state.timeline.map((seg, idx) => `
                            <div class="p-3 rounded-lg border transition-all ${state.currentIndex === idx ? 'bg-white border-blue-500 shadow-md ring-1 ring-blue-500' : 'bg-white border-gray-200 opacity-70'} flex flex-col">
                                <div class="flex justify-between items-center mb-2 cursor-pointer" onclick="Actions.jumpTo(${idx})">
                                    <span class="text-xs uppercase tracking-wider text-gray-500 font-bold">${seg.name}</span>
                                    <span class="text-xs font-display font-bold ${state.currentIndex === idx ? 'text-blue-600' : 'text-gray-400'}" id="tl-time-${idx}">
                                        ${state.currentIndex === idx ? formatTime(state.remaining) : formatTime(seg.seconds)}
                                    </span>
                                </div>
                                <input type="text" 
                                    value="${seg.speaker}" 
                                    oninput="Actions.updateSpeaker(event, ${idx})"
                                    class="w-full bg-transparent border-b border-transparent hover:border-gray-300 focus:border-blue-500 outline-none text-sm font-semibold text-gray-800 transition-colors pb-1"
                                />
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="flex-1 flex flex-col items-center justify-center p-8 bg-gray-100 relative">
                    <div class="bg-white rounded-[40px] shadow-xl p-12 w-full max-w-2xl flex flex-col items-center border border-gray-200">
                        
                        <div class="text-sm tracking-widest text-gray-400 uppercase font-bold mb-8">${current.name}</div>
                        
                        <div class="g2-curve bg-gray-50 border-2 border-gray-100 py-10 px-6 mb-8 flex justify-center min-w-[400px] w-full">
                            <div id="ctrl-main-time" class="font-display text-8xl font-bold inline-block transition-colors duration-300 ${state.remaining <= 30 && !state.isDone && state.remaining > 0 ? 'text-red-600' : 'text-gray-900'} ${state.isDone ? 'opacity-30' : ''}">
                                ${formatTime(state.remaining)}
                            </div>
                        </div>

                        <div class="w-full">
                            <div class="text-3xl font-bold text-gray-800 mb-8 text-center" id="ctrl-main-speaker">${current.speaker}</div>
                            
                            <div class="flex justify-center gap-4 mb-8">
                                <button id="ctrl-btn-toggle" onclick="Actions.toggleTimer()" class="flex-1 ${state.isRunning ? 'bg-amber-500 hover:bg-amber-400' : 'bg-green-600 hover:bg-green-500'} text-white py-5 rounded-2xl text-xl font-bold shadow-md transition-colors">
                                    ${state.isRunning ? 'PAUSE (Space)' : 'START (Space)'}
                                </button>
                                <button onclick="Actions.resetTimer()" class="w-1/4 bg-gray-200 hover:bg-gray-300 text-gray-700 py-5 rounded-2xl text-lg font-bold shadow-sm transition-colors">
                                    Reset (R)
                                </button>
                            </div>

                            <div class="flex justify-center gap-4 pt-6 border-t border-gray-100">
                                <button onclick="Actions.adjustTime(-10)" class="px-5 py-3 text-sm text-gray-500 hover:bg-gray-100 rounded-xl border border-gray-200 font-bold">-10s</button>
                                <button onclick="Actions.adjustTime(10)" class="px-5 py-3 text-sm text-gray-500 hover:bg-gray-100 rounded-xl border border-gray-200 font-bold">+10s</button>
                                <div class="flex-1"></div>
                                <button onclick="Actions.prevSegment()" class="px-6 py-3 text-sm text-gray-600 hover:bg-gray-100 rounded-xl font-bold transition-colors">Prev</button>
                                <button onclick="Actions.nextSegment()" class="px-6 py-3 text-sm text-blue-600 bg-blue-50 hover:bg-blue-100 border border-blue-200 rounded-xl font-bold shadow-sm transition-colors">Next (Enter)</button>
                            </div>
                        </div>

                    </div>
                    <div class="absolute bottom-6 text-xs text-gray-400 text-center w-full font-bold tracking-wide">
                        KEYBOARD SHORTCUTS: [SPACE] PLAY/PAUSE • [ENTER] NEXT SPEAKER • [R] RESET
                    </div>
                </div>
            </div>
        </div>
    `;
}

// --- Smart Renderer ---
function syncUI() {
    if (isStageMode) {
        document.getElementById('app').innerHTML = buildStageHTML();
        return;
    }

    if (lastRenderedIndex !== state.currentIndex) {
        document.getElementById('app').innerHTML = buildControllerHTML();
        lastRenderedIndex = state.currentIndex;
    } else {
        const timeEl = document.getElementById('ctrl-main-time');
        if (timeEl) {
            timeEl.innerText = formatTime(state.remaining);
            timeEl.className = `font-display text-8xl font-bold inline-block transition-colors duration-300 ${state.remaining <= 30 && !state.isDone && state.remaining > 0 ? 'text-red-600' : 'text-gray-900'} ${state.isDone ? 'opacity-30' : ''}`;
        }
        
        const btnToggle = document.getElementById('ctrl-btn-toggle');
        if (btnToggle) {
            btnToggle.innerText = state.isRunning ? 'PAUSE (Space)' : 'START (Space)';
            btnToggle.className = `flex-1 ${state.isRunning ? 'bg-amber-500 hover:bg-amber-400' : 'bg-green-600 hover:bg-green-500'} text-white py-5 rounded-2xl text-xl font-bold shadow-md transition-colors`;
        }
        
        const tlTimeEl = document.getElementById(`tl-time-${state.currentIndex}`);
        if (tlTimeEl) tlTimeEl.innerText = formatTime(state.remaining);
    }
}

// --- Listeners ---
channel.onmessage = (e) => {
    if (e.data.type === 'SYNC') {
        state = e.data.state;
        syncUI();
    }
};

if (!isStageMode) {
    window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;
        
        if (e.code === 'Space') {
            e.preventDefault();
            Actions.toggleTimer();
        } else if (e.code === 'Enter') {
            e.preventDefault();
            Actions.nextSegment();
        } else if (e.code === 'KeyR') {
            e.preventDefault();
            Actions.resetTimer();
        }
    });
} else {
    let stageTimeout;
    document.addEventListener('mousemove', () => {
        const btn = document.getElementById('stage-fs-btn');
        if(btn) {
            btn.style.opacity = '1';
            document.body.style.cursor = 'default';
            clearTimeout(stageTimeout);
            stageTimeout = setTimeout(() => {
                btn.style.opacity = '0';
                document.body.style.cursor = 'none';
            }, 3000);
        }
    });
}

// Initialize
syncUI();
</script>
</body>
</html>
